<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}Job Matcher{{end}}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">// job-matcher</div>
        <h1>Resume Match</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-link {{block "nav_jobs" .}}{{end}}">
          <span class="icon">⬡</span> Jobs
        </a>
        <a href="/resumes" class="nav-link {{block "nav_resumes" .}}{{end}}">
          <span class="icon">◈</span> Resumes
        </a>
      </nav>
      <div class="sidebar-footer">SQLite · Local · v2.0</div>
    </aside>
    <main class="main">
      {{block "content" .}}{{end}}
    </main>
  </div>
  <div id="toast"></div>
  <script src="/static/js/app.js?v=13"></script>
  {{block "extra_js" .}}{{end}}
</body>
</html>
