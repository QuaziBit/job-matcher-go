name: Build & Release

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Cross-compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1

      - name: Build Windows (.exe)
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/job-matcher.exe .

      - name: Build Linux
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/job-matcher-linux .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/job-matcher.exe
            dist/job-matcher-linux
          body: |
            ## Job Matcher ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `job-matcher.exe` |
            | Linux    | `job-matcher-linux` |

            ### Usage
            1. Download the binary for your platform
            2. Place it in any folder
            3. Double-click (Windows) or `./job-matcher-linux` (Linux)
            4. A browser window opens with the launcher
            5. Configure and click Start
